name: milo

services:
  api:
    image: ${MILO_IMAGE:-ghcr.io/vasujain275/milo}:${MILO_VERSION:-latest}
    container_name: milo-api
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${API_HOST_PORT:-7007}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: milo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-milo}
      POSTGRES_USER: ${POSTGRES_USER:-milo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-milo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: milo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
